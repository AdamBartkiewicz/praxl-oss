services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: praxl
      POSTGRES_PASSWORD: praxl
      POSTGRES_DB: praxl
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxl"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://praxl:praxl@db:5432/praxl
    command: npx drizzle-kit push
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://praxl:praxl@db:5432/praxl

volumes:
  pgdata:
