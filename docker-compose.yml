services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: praxl
      POSTGRES_PASSWORD: praxl
      POSTGRES_DB: praxl
    volumes:
      - pgdata:/var/lib/postgresql/data
    # NOTE: db is intentionally NOT published to the host. The app and migrate
    # services connect via the internal Docker network at db:5432. If you need
    # direct host access (e.g. to inspect with a GUI client), uncomment:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxl"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://praxl:praxl@db:5432/praxl
    # --force makes drizzle-kit non-interactive. Without it, the migrate
    # container hangs forever if drizzle-kit detects a potentially destructive
    # schema change and waits on stdin (which doesn't exist in detached mode).
    command: npx drizzle-kit push --force
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://praxl:praxl@db:5432/praxl

volumes:
  pgdata:
